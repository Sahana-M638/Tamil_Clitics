<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <title>🔡 Tamil Clitic Annotator</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Noto Sans Tamil','Latha','Nirmala UI','Arial Unicode MS',sans-serif;
        }
        body { 
            font-family: 'Noto Sans Tamil', sans-serif; 
            background: linear-gradient(135deg, #f3e5f5, #ede7f6); 
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        .container { 
            background: white; 
            padding: 25px; 
            width: 95%; 
            max-width: 950px;
            margin-top: 40px;
            border-radius: 15px; 
            border: 3px solid #7e57c2;
            box-shadow: 0 6px 20px rgba(103, 58, 183, 0.25);
            text-align: center;
        }
        h2 {
            color: #4a148c;
            margin-bottom: 20px;
            font-size: 28px;
        }
        label {
            font-size: 18px;
            color: #4a148c;
            font-weight: bold;
        }
        textarea { 
            width: 80%; 
            height: 80px; 
            font-size: 18px; 
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #7e57c2;
            outline: none;
            background: #faf5ff;
            margin-top: 10px;
        }
        textarea:focus {
            border-color: #512da8;
            background: #f5e9ff;
        }
        button { 
            background: #7e57c2; 
            color: white; 
            padding: 10px 25px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px;
            font-weight: bold;
            margin-top: 12px;
            transition: background 0.3s;
        }
        button:hover { background: #5e35b1; }
        .word-list { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin-top: 20px; 
        }
        .word-box { 
            display: flex; 
            align-items: flex-start; 
            padding: 12px; 
            margin: 12px 0; 
            border-radius: 10px; 
            background: white; 
            border: 2px solid #7e57c2; 
            flex-wrap: wrap;
            width: fit-content;
            box-shadow: 0 2px 10px rgba(103, 58, 183, 0.15);
        }
        .utf8-box { 
            background: #f3e5f5; 
            padding: 10px; 
            border-radius: 6px; 
            white-space: pre-line;
            min-width: 210px;
            text-align: left;
            margin-right: 12px;
            font-size: 15px;
            line-height: 1.5;
        }
        .result-box { 
            background: #ede7f6; 
            padding: 10px; 
            border-radius: 6px; 
            min-width: 160px;
            color: #4a148c;
            font-size: 15px;
            line-height: 1.5;
        }
        .word-title { 
            font-weight: bold; 
            color: #4a148c; 
            margin-bottom: 8px; 
            font-size: 17px;
        }
        pre {
            margin: 0;
            font-family: 'Noto Sans Tamil', sans-serif;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔡 Tamil Clitic Annotator</h2>
        <form method="POST">
            <label>Enter Tamil sentence:</label><br>
            <textarea id="tamilInput" name="tamil_sentence" placeholder="உங்கள் தமிழ் வாக்கியத்தை இங்கே உள்ளிடவும்..." required>{{ tamil_sentence }}</textarea><br>

            <div id="keyboard"></div>

            <button type="submit"> Check Clitics</button>
        </form>

        {% if word_list %}
            <h3 style="color:#4a148c; margin-top:25px;"> Results</h3>
            <div class="word-list">
                {% for w in word_list %}
                <div class="word-box">
                    <div class="utf8-box">
                        <div class="word-title">{{ w.word }}</div>
                        <pre>{{ w.utf8 }}</pre>
                    </div>
                    <div class="result-box">
                        <p>Clitic: {{ w.result }}</p>
                        <p>Root Word: {{ w.root_word }}</p>
                    </div>
                </div>
                {% endfor %}
            </div>
        {% endif %}
    </div>

    <!-- React + Babel -->
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <!-- Tamil Keyboard -->
    <script type="text/babel" src="{{ url_for('static', filename='tamilkeyboard.js') }}"></script>
    <script type="text/babel">
        ReactDOM.render(<TamilKeyboard />, document.getElementById('keyboard'));
    </script>
</body>
</html>
